{% extends 'base.html' %}

{% block content %}
<h2>Editar Produto #{{ produto['id'] }}</h2>
<div class="card shadow-sm mt-3">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome do Produto</label>
                <input type="text" name="nome" class="form-control" value="{{ produto['nome'] }}" required>
            </div>
            <div class="mb-3">
                <label for="quantidade" class="form-label">Quantidade</label>
                <input type="number" name="quantidade" class="form-control" value="{{ produto['quantidade'] }}" required min="0">
            </div>
            <div class="mb-3">
                <label for="preco" class="form-label">Preço (R$)</label>
                <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto['preco'] }}" required min="0">
            </div>
            <button type="submit" class="btn btn-success">Atualizar</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
